services:
    app:
        build:
            context: ./docker/php
            args:
                UID: '${UID:-1000}'
                GID: '${GID:-1000}'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '.:/var/www/html'
        networks:
            - app-network
        depends_on:
            mysql:
                condition: service_healthy

    nginx:
        image: 'nginx:1.24'
        ports:
            - '${APP_PORT:-8080}:80'
        volumes:
            - '.:/var/www/html'
            - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
        networks:
            - app-network
        depends_on:
            - app

    mysql:
        image: 'mysql:8.0'
        ports:
            - '${FORWARD_DB_PORT:-33060}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'mysql-data:/var/lib/mysql'
        networks:
            - app-network
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s

networks:
    app-network:
        driver: bridge

volumes:
    mysql-data:
        driver: local
